<!DOCTYPE html>
<html>
<head>
    <title>Mustafa Official Website</title>

    <meta name="description" content="Ahmad official site for learning and downloads">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        header {
            text-align: center;
            padding: 20px;
            background: #1e293b;
        }

        nav {
            display: flex;
            justify-content: center;
            background: #334155;
        }

        nav a {
            padding: 15px;
            color: white;
            text-decoration: none;
            cursor: pointer;
        }

        nav a:hover {
            background: #ef4444;
        }

        section {
            display: none;
            padding: 40px;
            text-align: center;
        }

        .active {
            display: block;
        }

        button {
            padding: 12px 25px;
            background: #ef4444;
            border: none;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        input, textarea {
            padding: 10px;
            width: 250px;
        }
    </style>
</head>

<body>

<header>
    <h1>Mustafa Official Website 🚀</h1>
</header>

<nav>
    <a onclick="showPage('home')">Home</a>
    <a onclick="showPage('downloads')">Downloads</a>
    <a onclick="showPage('about')">About</a>
    <a onclick="showPage('contact')">Contact</a>
</nav>

<!-- HOME -->
<section id="home" class="active">
    <h2>Welcome</h2>
    <p>Learn programming and download useful tools</p>

    <!-- 🎵 MUSIC -->
    <h3>🎵 Listen to Music</h3>
    <audio controls>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <br>
    <button onclick="showPage('downloads')">Go to Downloads</button>
</section>

<!-- DOWNLOAD -->
<section id="downloads">
    <h2>Downloads</h2>
    <p>Useful tools:</p>

    <button onclick="downloadMsg()">Download Tool 1</button>

    <br><br>

    <!-- ⬇️ MUSIC DOWNLOAD -->
    <h3>⬇️ Download Music</h3>
    <a href="music.mp3" download>
        <button>Download Song</button>
    </a>
</section>

<!-- ABOUT -->
<section id="about">
    <h2>About Me</h2>
    <p>I am Mustafa, learning programming and building websites 💻</p>
</section>

<!-- CONTACT -->
<section id="contact">
    <h2>Contact</h2>

    <input type="text" placeholder="Your Name"><br><br>
    <input type="email" placeholder="Your Email"><br><br>
    <textarea placeholder="Your Message"></textarea><br><br>

    <button onclick="sendMessage()">Send</button>
</section>

<script>
function showPage(pageId) {
    let sections = document.querySelectorAll("section");
    sections.forEach(sec => sec.classList.remove("active"));

    document.getElementById(pageId).classList.add("active");
}

function sendMessage() {
    let name = document.querySelector("input[type='text']").value;
    let email = document.querySelector("input[type='email']").value;
    let message = document.querySelector("textarea").value;

    if(name === "" || email === "" || message === ""){
        alert("لطفاً همه فیلدها را پر کن ❌");
        return;
    }

    db.collection("messages").add({
        name: name,
        email: email,
        message: message,
        time: new Date()
    });

    alert("پیام ذخیره شد در دیتابیس ✅");
}

function downloadMsg() {
    alert("Download started 📥");
}
</script>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

const firebaseConfig = {

  authDomain: "my-website-dh.firebaseapp.com",
  projectId: "my-website-dh",
  storageBucket: "my-website-dh.appspot.com",
  messagingSenderId: "464301983428",
  appId: "1:464301983428:web:1f78da17dd0ff1b2f7eb91"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

</body>
</html>
